<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Graphics</title>

<style type="text/css">

body{
	background-color: #f5f5dc;
	font-family: Arial, Helvetica, sans-serif;
}

	#thumbs, #image {
		width: 900px;
		text-align: center;
		margin: 0 auto 0 auto;
		color: #000;
		background-color: #D2B47C;
		padding:10px;
	}

	#thumbs {
		margin-top: 10px;
	}

	#thumbs img {
		border: 6px solid #003300;
		margin: 5px;
		padding: 4px;
		background-color: #f5f5dc;
	}

	#image{
		height:500px;
	}

	.instructions{
		font-style:italic;
	}

</style>

<script language="JavaScript" type="text/javascript">

		var imgArray = new Array(
			'Image1Lg.jpg',
			'Image2Lg.jpg',
			'Image3Lg.jpg',
			'Image4Lg.jpg'
			

		);


		var titleArray = new Array(
			'Pioneer crockpot',
			'Chocolate cupcake with blue frosting',
			'Ingredients for native pasta dish',
			'Raspberry cake with sauce'
			
		);
			
		var imgPath = "Images/fullsize/";
		
		function swapImage(imgID) {

			var theImage = document.getElementById('theImage');
			var textDiv = document.getElementById('bottomText');

			var newImg;
			var textTitle;

			newImg = imgArray[imgID];
			theImage.src = imgPath + newImg;

			textTitle=titleArray[imgID];

      			textDiv.innerHTML = textTitle;
		}
			
		function preloadImages() {		
			for(var i = 0; i < imgArray.length; i++) {
				var tmpImg = new Image;
				tmpImg.src = imgPath + imgArray[i];
			}
		}
		

</script>


</head>
<body  onload="preloadImages()">


<div align="center">

<div>
<a href=""
onmouseover="document.getElementById('print').src='Images/Print2.jpg';"
onmouseout="document.getElementById('print').src='Images/Print1.jpg';">

<img src="Images/Print1.jpg"
name="PrintButton"
alt="PrintButton"
style="border:none;"
width="200"
height="50"
id="print">

</a>
</div>

<div>
<a href=""
onmouseover="document.getElementById('logo').src='Images/logo2.jpg';"
onmouseout="document.getElementById('logo').src='Images/logo1.jpg';">

<img src="Images/logo1.jpg"
alt="Logo"
id="logo">

</a>
</div>

<br />
<br />
<br />
<br />

<div id="thumbs">

<img src="Images/thumbnails/Image1sm.jpg"
onmouseover="swapImage(0)">

<img src="Images/thumbnails/Image2sm.jpg"
onmouseover="swapImage(1)">

<img src="Images/thumbnails/Image3sm.jpg"
onmouseover="swapImage(2)">

<img src="Images/thumbnails/Image4sm.jpg"
onmouseover="swapImage(3)">

</div>

<div id="image">
<img src="Images/fullsize/Image1Lg.jpg" id="theImage">
<p class="instructions">Hover over thumbnails to change image</p>

<p id="bottomText">Pioneer crockpot</p>
</div>

<br />
<br />
<br />
<br />



</div>

<p>
    <a href="http://validator.w3.org/check?uri=referer"><img
      src="http://www.w3.org/Icons/valid-xhtml10" alt="Valid XHTML 1.0 Transitional" height="31" width="88" /></a>
</p>
  

</body>
</html>
